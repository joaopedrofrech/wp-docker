services:
  # WordPress PHP-FPM with SQLite
  wordpress:
    image: ghcr.io/yunussandikci/wordpress-sqlite:7.0.0-php8.4-fpm
    user: "33:33"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      sh -c '
        # Keep SQLite integration always aligned with the image version on each deploy
        mkdir -p /var/www/html/wp-content/mu-plugins &&
        # Only refresh files when SQLite integration version changes
        SQLITE_SRC_VERSION="$$(grep -m1 "Version:" /usr/src/wordpress/wp-content/db.php | sed "s/.*Version:[[:space:]]*//")" &&
        SQLITE_DST_VERSION="$$(grep -m1 "Version:" /var/www/html/wp-content/db.php 2>/dev/null | sed "s/.*Version:[[:space:]]*//")" &&
        if [ -n "$$SQLITE_SRC_VERSION" ] && [ "$$SQLITE_SRC_VERSION" = "$$SQLITE_DST_VERSION" ] && [ -d /var/www/html/wp-content/mu-plugins/sqlite-database-integration ]; then
          echo "SQLite integration already at version $$SQLITE_SRC_VERSION";
        else
          rm -rf /var/www/html/wp-content/mu-plugins/sqlite-database-integration &&
          cp -a /usr/src/wordpress/wp-content/mu-plugins/sqlite-database-integration /var/www/html/wp-content/mu-plugins/ &&
          cp -f /usr/src/wordpress/wp-content/db.php /var/www/html/wp-content/db.php;
        fi &&
        # Hand over to the official image entrypoint
        exec docker-entrypoint.sh php-fpm
      '
    environment:
      ADMINER_LOGIN_PASSWORD: ${ADMINER_LOGIN_PASSWORD}
      WP_MEMORY_LIMIT: ${WP_MEMORY_LIMIT}
      WP_MAX_MEMORY_LIMIT: ${WP_MAX_MEMORY_LIMIT}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE}
      MAX_EXECUTION_TIME: ${MAX_EXECUTION_TIME}
      TZ: ${TZ}
      WORDPRESS_CONFIG_EXTRA: |
        if (!defined('WP_DEBUG')) define('WP_DEBUG', ${WP_DEBUG});
        if (!defined('WP_DEBUG_LOG')) define('WP_DEBUG_LOG', ${WP_DEBUG_LOG});
        if (!defined('WP_DEBUG_DISPLAY')) define('WP_DEBUG_DISPLAY', ${WP_DEBUG_DISPLAY});
        if (!defined('WP_CACHE')) define('WP_CACHE', ${WP_CACHE});
        if (!defined('DISABLE_WP_CRON')) define('DISABLE_WP_CRON', ${DISABLE_WP_CRON});
        if (!defined('DISALLOW_FILE_EDIT')) define('DISALLOW_FILE_EDIT', ${DISALLOW_FILE_EDIT});
        if (!defined('FORCE_SSL_LOGIN')) define('FORCE_SSL_LOGIN', ${FORCE_SSL_LOGIN});
        if (!defined('FORCE_SSL_ADMIN')) define('FORCE_SSL_ADMIN', ${FORCE_SSL_ADMIN});
        if (!defined('FS_METHOD')) define('FS_METHOD', '${FS_METHOD}');
        if (!defined('WP_HTTP_BLOCK_EXTERNAL')) define('WP_HTTP_BLOCK_EXTERNAL', ${WP_HTTP_BLOCK_EXTERNAL});
        if (!defined('WP_ACCESSIBLE_HOSTS')) define('WP_ACCESSIBLE_HOSTS', '${WP_ACCESSIBLE_HOSTS}');

        /* Performance & Memory */
        if (!defined('WP_MEMORY_LIMIT')) define('WP_MEMORY_LIMIT', '${WP_MEMORY_LIMIT}');
        if (!defined('WP_MAX_MEMORY_LIMIT')) define('WP_MAX_MEMORY_LIMIT', '${WP_MAX_MEMORY_LIMIT}');
        if (!defined('WP_POST_REVISIONS')) define('WP_POST_REVISIONS', ${WP_POST_REVISIONS});
        if (!defined('EMPTY_TRASH_DAYS')) define('EMPTY_TRASH_DAYS', ${EMPTY_TRASH_DAYS});

        /* PHP Upload & Limits */
        @ini_set('upload_max_filesize', '${PHP_UPLOAD_MAX_FILESIZE}');
        @ini_set('post_max_size', '${PHP_POST_MAX_SIZE}');
        @ini_set('max_execution_time', '${MAX_EXECUTION_TIME}');

        /* Security & Updates */
        if (!defined('AUTOMATIC_UPDATER_DISABLED')) define('AUTOMATIC_UPDATER_DISABLED', ${AUTOMATIC_UPDATER_DISABLED});
        if (!defined('WP_AUTO_UPDATE_CORE')) define('WP_AUTO_UPDATE_CORE', ${WP_AUTO_UPDATE_CORE});

        /* SQLite Object Cache MMAP - Performance */
        if (!defined('WP_SQLITE_OBJECT_CACHE_MMAP_SIZE')) define('WP_SQLITE_OBJECT_CACHE_MMAP_SIZE', ${WP_SQLITE_OBJECT_CACHE_MMAP_SIZE:-0});

        /* Fix Cloudflare Real IP - Docker Escape */
        if (isset($$_SERVER['HTTP_CF_CONNECTING_IP'])) {
            $$_SERVER['REMOTE_ADDR'] = $$_SERVER['HTTP_CF_CONNECTING_IP'];
        }
    volumes:
      # WordPress data (persistent)
      - wordpress-data:/var/www/html

      # PHP runtime configuration
      - ./wordpress/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./wordpress/php-fpm.conf:/usr/local/etc/php-fpm.d/zzz-custom.conf

      # Adminer files exposed under /db
      - ./adminer/db.php:/var/www/html/adminer/db.php
      - ./adminer/adminer.php:/var/www/html/adminer/adminer.php
      - ./adminer/login-password-less.php:/var/www/html/adminer/login-password-less.php
    networks:
      - wp-network
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
        reservations:
          memory: 100M

  # Nginx - Web Server
  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - wordpress
    volumes:
      - wordpress-data:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - wp-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.5"
        reservations:
          memory: 12M

  # File Browser
  filebrowser:
    image: filebrowser/filebrowser:v2.62.2-s6
    healthcheck:
      disable: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PUID=33
      - PGID=33
    volumes:
      - wordpress-data:/srv
      - ./filebrowser.json:/config/settings.json
      - filebrowser-data:/database
    networks:
      - wp-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 12M

  # Project Volumes
volumes:
  wordpress-data:
    driver: local
  filebrowser-data:
    driver: local

# Project Networks
networks:
  wp-network:
    driver: bridge
