server {
    # ====================================
    # Nginx Server Configuration
    # ====================================

    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    # ====================================

    # ---- Security Rules

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Client upload size
    client_max_body_size 512M;
    client_body_timeout 600S;
    send_timeout 600s;

    # WordPress security - Block access to sensitive files (WordPress.org recommended)
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
        access_log off;
    }

    # Deny access to hidden files (WordPress.org recommended)
    location ~ /\. {
        deny all;
        access_log off;
    }

    location ~* \.(htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
        access_log off;
    }

    # WordPress common files
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Block xmlrpc.php attacks (DDoS prevention)
    location = /xmlrpc.php {
        deny all;
        access_log off;
    }

    # Block direct access to wp-cron.php (use system cron instead)
    # Uncomment to disable external wp-cron access
    # location = /wp-cron.php {
    #     deny all;
    #     access_log off;
    # }

    # ====================================

    # ---- Adminer

    # Adminer only available through db.* and db-*.* subdomains
    location = / {
        if ($host ~* ^db(-[a-z0-9-]+)?\.) {
            rewrite ^ /adminer/db.php last;
        }

        try_files $uri $uri/ /index.php?$args;
    }

    location = /adminer/db.php {
        if ($host !~* ^db(-[a-z0-9-]+)?\.) {
            return 404;
        }

        try_files $uri =404;
        fastcgi_pass wordpress:9000;
        fastcgi_index db.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;
    }

    # Block direct access to Adminer internal files
    location = /adminer/adminer.php {
        deny all;
        access_log off;
    }

    location = /adminer/login-password-less.php {
        deny all;
        access_log off;
    }

    location = /adminer {
        return 404;
    }

    location = /adminer/ {
        return 404;
    }

    # ====================================

    # ---- Wordpress Specific Optimizations

    # Rate limit wp-login.php (prevent brute-force attacks)
    location = /wp-login.php {
        limit_req zone=login burst=3 nodelay;
        try_files $uri =404;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;
    }

    # Rate limit admin-ajax.php (prevent DoS attacks)
    location = /wp-admin/admin-ajax.php {
        try_files $uri =404;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 600s;
        fastcgi_read_timeout 600s;
    }

    # WordPress admin security
    location /wp-admin {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Security params
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;

        # Performance
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 600s;
        fastcgi_read_timeout 600s;
    }

    # WordPress permalinks
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ====================================

    # ---- cloudflare-cache plugin

    # Gzip settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    # Browser caching rules
    location ~* \.(xml|xsl)$ { add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0"; expires -1; }
    location /robots.txt { add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0"; expires -1; }
    location ~* \.(css|js|pdf)$ { add_header Cache-Control "public, must-revalidate, proxy-revalidate, immutable, max-age=2592000, stale-while-revalidate=86400, stale-if-error=604800"; expires 30d; }
    location ~* \.(jpg|jpeg|png|gif|ico|eot|swf|svg|webp|avif|ttf|otf|woff|woff2|ogg|mp4|mpeg|avi|mkv|webm|mp3)$ { add_header Cache-Control "public, must-revalidate, proxy-revalidate, immutable, max-age=31536000, stale-while-revalidate=86400, stale-if-error=604800"; expires 365d; }
    location /wp-cron.php { add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0"; expires -1; }

}
